<title> Status </title>

<h1> Status</h1>
<h2> All Systems Operational!</h2>
<style>
        body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Courier New', bold, monospace;
            color: #000000;
            background-color: #ffae00;
            background-blend-mode: normal;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        html {
            scroll-behavior: smooth;
        }
        a {
            color: rgb(0, 255, 13);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .screen,
        .container {
            width: min(92vw, 920px);
            margin: 24px auto 40px;
            padding: 32px;
            background: rgba(12, 18, 46, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
        }
        .container {
            max-width: 680px;
        }
        h1, h2 {
            text-align: center;
            margin: 0 0 18px;
            color: #f4d6ff;
        }
        p,
        ul,
        ol,
        dl {
            max-width: 760px;
            margin: 0 auto 22px;
            line-height: 1.8;
            color: #dcd2ff;
        }
        ul,
        ol {
            padding-left: 1.4rem;
        }
        ul li,
        ol li {
            margin-bottom: 10px;
        }
        .button-row,
        .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin: 0 auto 16px;
        }
        .button-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 150px;
            padding: 12px 20px;
            border-radius: 12px;
            border: 2px solid rgba(0, 0, 0, 0.75);
            background: linear-gradient(180deg, #080808 0%, #242424 100%);
            color: rgb(0, 255, 13);
            text-decoration: none;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
            transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease, color 180ms ease;
            font-size: 0.98rem;
            letter-spacing: 0.03em;
        }
        .button-link:hover {
            transform: translateY(-1px);
            background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
            box-shadow: 0 16px 34px rgba(0, 0, 0, 0.45);
            color: #b7ff9e;
        }
        .top-bar {
            width: min(92vw, 980px);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 18px;
            margin: 24px auto 0;
            padding: 16px 22px;
            background: rgba(9, 14, 35, 0.92);
            border: 1px solid rgba(100, 255, 150, 0.16);
            border-radius: 18px;
            box-shadow: 0 18px 38px rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(14px);
        }
        .top-links {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            align-items: center;
            justify-content: center;
        }
        .top-divider {
            opacity: 0.55;
            margin: 0 10px;
        }
        .lang-switcher {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.08);
            color: inherit;
            cursor: pointer;
            user-select: none;
        }
        .lang-switcher:hover {
            background: rgba(255, 255, 255, 0.14);
        }
        .lang-icon,
        .lang-arrow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .lang-icon {
            font-size: 1.05rem;
        }
        .lang-arrow {
            font-size: 0.95rem;
        }
        .language-dropdown {
            position: absolute;
            right: 0;
            top: calc(100% + 12px);
            width: 270px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(12, 18, 45, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 20px 46px rgba(0, 0, 0, 0.35);
            display: none;
            z-index: 50;
        }
        .language-dropdown.open {
            display: block;
        }
        .language-dropdown a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 10px 12px;
            margin: 8px 0;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.06);
            color: #f3e7ff;
            text-decoration: none;
            transition: background 180ms ease, transform 180ms ease;
            border: 1px solid transparent;
        }
        .language-dropdown a:hover {
            background: rgba(255, 255, 255, 0.16);
            transform: translateX(1px);
        }
        .language-dropdown a.current {
            font-weight: 700;
            color: #a8ff7e;
            background: rgba(255, 255, 255, 0.12);
        }
        @media (max-width: 760px) {
            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .language-dropdown {
                right: auto;
                left: 0;
                width: calc(100% - 28px);
            }
            .screen,
            .container {
                padding: 22px;
            }
        }
</style>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">


<style>
body {
  margin: 0;
  background: rgb(32, 129, 153);
  overflow: hidden;
}

/* COMPUTER POSITION */
.status-dot {
  width: 14px;
  height: 14px;
  background: rgb(17, 255, 0);
  border-radius: 50%;
  position: absolute;

  top: 12px;
  left: 748px;

  box-shadow: 0 0 10px rgb(0, 255, 94);
}

/* PULSE */
.status-dot::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgb(17, 255, 0);
  animation: ping 1.5s infinite;
  opacity: 0.7;
}

@keyframes ping {
  0% {
    transform: scale(1);
    opacity: 0.7;
  }

  100% {
    transform: scale(2.8);
    opacity: 0;
  }
}

/* MOBILE FIX */
@media (max-width: 768px) {
  .status-dot {
    left: 50%;
    transform: translateX(-50%);
    top: 12px;
  }
}
</style>
</head>

<body>

<div class="status-dot"></div>

</body>
</html>
