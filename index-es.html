<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>nittany34.com</title>
    <link rel="icon" href="Untitled Project.jpg">
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #3b6dfa 0%, #07142a 55%);
            color: #eef4ff;
        }
        main {
            width: min(760px, calc(100vw - 32px));
            text-align: center;
            padding: 40px 32px;
            border-radius: 32px;
            background: rgba(8, 17, 39, 0.92);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
        }
        h1 {
            margin: 0;
            font-size: clamp(2.2rem, 4vw, 3.6rem);
            letter-spacing: -0.04em;
        }
        p {
            max-width: 680px;
            margin: 20px auto 0;
            line-height: 1.8;
            color: #d9e5ff;
            font-size: 1rem;
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin: 30px auto 0;
        }
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 20px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease;
            border: 1px solid rgba(255, 255, 255, 0.16);
        }
        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
        }
        .button.primary {
            background: #4285f4;
            color: white;
            border-color: transparent;
        }
        .button.accent {
            background: rgba(255, 255, 255, 0.08);
            color: #d9e5ff;
        }
        footer {
            margin-top: 32px;
            color: #94a7d8;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <main>
        <h1>nittany34.com</h1>
        <p>Bienvenido a una versión más limpia del sitio. Inicia sesión con tu cuenta de Google para acceder a tu panel y mantener la experiencia simple.</p>
        <div class="actions">
            <a class="button primary" href="google-login.html">Iniciar sesión con Google</a>
            <a class="button accent" href="about-es.html">Acerca de</a>
            <a class="button accent" href="system-requirements-es.html">Requisitos del sistema</a>
            <a class="button accent" href="documenting-es.html">Viaje de codificación</a>
            <a class="button accent" href="https://www.youtube.com/@Nittany34YT" target="_blank">Canal de YouTube</a>
        </div>
        <footer>desarrollado por nittany34</footer>
    </main>
</body>
</html>
