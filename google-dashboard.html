<!DOCTYPE html>
<html>
<head>
    <title>Google Dashboard</title>
    <link rel="icon" href="Untitled Project.jpg">
    <style>
        body {
            background-color: rgb(0, 183, 255);
            font-family: 'Courier New', monospace;
            color: rgb(225, 0, 255);
            margin: 0;
            padding: 0;
        }
        a {
            color: rgb(212, 0, 255);
        }
        a:hover {
            color: rgb(255, 0, 0);
        }
        .container {
            max-width: 520px;
            margin: 36px auto;
            padding: 26px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid black;
            border-radius: 18px;
        }
        h1, h2 {
            text-align: center;
        }
        p {
            text-align: center;
            margin: 0 auto 22px;
            line-height: 1.6;
        }
        .info {
            margin: 18px 0;
            padding: 18px;
            border: 2px solid black;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.08);
        }
        .info div {
            margin: 10px 0;
        }
        .actions {
            text-align: center;
            margin-top: 20px;
        }
        .button-link {
            display: inline-block;
            padding: 12px 20px;
            background: linear-gradient(to right, black, #333);
            color: rgb(0, 255, 13);
            text-decoration: none;
            border: 2px solid black;
            border-radius: 10px;
            margin: 8px;
        }
        .button-link:hover {
            background-color: rgb(47, 0, 255);
            color: rgb(255, 0, 0);
        }
        footer {
            text-align: center;
            margin-top: 26px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Google Dashboard</h1>
        <p>Your account is active. This page mirrors the site style while keeping the login path quick and simple.</p>
        <div class="info">
            <div><strong>Email:</strong> <span id="userEmail">...</span></div>
            <div><strong>Status:</strong> Signed in</div>
            <div><strong>Mode:</strong> Browser demo</div>
        </div>
        <div class="actions">
            <a href="#" id="signOut" class="button-link">Sign out</a>
            <a href="index.html" class="button-link">Home</a>
        </div>
    </div>
    <footer>developed by nittany34</footer>
    <script>
        const email = sessionStorage.getItem('googleUserEmail');
        if (!email) {
            window.location.href = 'google-login.html';
        } else {
            document.getElementById('userEmail').textContent = email;
        }
        document.getElementById('signOut').addEventListener('click', event => {
            event.preventDefault();
            sessionStorage.removeItem('googleUserEmail');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
