<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google Dashboard</title>
    <link rel="icon" href="Untitled Project.jpg">
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #0a1933 0%, #07142a 100%);
            color: #eef4ff;
        }
        main {
            width: min(720px, calc(100vw - 32px));
            padding: 40px 34px;
            border-radius: 30px;
            background: rgba(10, 19, 51, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.32);
        }
        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3rem);
        }
        p {
            color: #c8d5ff;
            line-height: 1.75;
            margin: 16px 0 28px;
            max-width: 700px;
        }
        .card {
            padding: 26px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            margin-bottom: 24px;
        }
        .card h2 {
            margin-top: 0;
            color: #f8fbff;
        }
        dl {
            display: grid;
            gap: 12px;
            margin: 0;
        }
        dt {
            font-size: 0.96rem;
            color: #8fa9d9;
        }
        dd {
            margin: 0;
            color: #eef4ff;
            font-weight: 600;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }
        .button {
            padding: 14px 22px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 160ms ease, box-shadow 160ms ease;
            border: 1px solid transparent;
        }
        .button.primary {
            background: #4285f4;
            color: white;
        }
        .button.accent {
            background: rgba(255, 255, 255, 0.08);
            color: #d9e5ff;
            border-color: rgba(255, 255, 255, 0.14);
        }
        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 36px rgba(66, 133, 244, 0.24);
        }
    </style>
</head>
<body>
    <main>
        <h1>Google Account Dashboard</h1>
        <p id="intro">Loading your account...</p>
        <section class="card">
            <h2>Account overview</h2>
            <dl>
                <div>
                    <dt>Email</dt>
                    <dd id="userEmail">—</dd>
                </div>
                <div>
                    <dt>Account status</dt>
                    <dd>Signed in</dd>
                </div>
                <div>
                    <dt>Session type</dt>
                    <dd>Browser-based demo</dd>
                </div>
            </dl>
        </section>
        <div class="actions">
            <a class="button primary" id="signOut" href="#">Sign out</a>
            <a class="button accent" href="index.html">Back to Home</a>
        </div>
    </main>
    <script>
        const email = sessionStorage.getItem('googleUserEmail');
        if (!email) {
            window.location.href = 'google-login.html';
        } else {
            document.getElementById('userEmail').textContent = email;
            document.getElementById('intro').textContent = `Welcome back, ${email}. Your Google account experience is ready.`;
        }
        document.getElementById('signOut').addEventListener('click', event => {
            event.preventDefault();
            sessionStorage.removeItem('googleUserEmail');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
