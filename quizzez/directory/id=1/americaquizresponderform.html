<h1>Question 1</h1>
<p>What year was the Declaration of Independence signed?</p>

<input type="checkbox"> <p>1446</p>
<input id="correct1" type="checkbox"> <p>1776</p>
<input type="checkbox"> <p>1922</p>
<input type="checkbox"> <p>1825</p>


<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.body.insertAdjacentHTML('beforeend', 
      `<dialog id="pop" style="border:4px solid #b22234; border-radius:12px; padding:24px; text-align:center; background:#fff; box-shadow:0 10px 25px rgba(0,0,0,0.3);">
        <h1 style="color:#3c3b6e; font-family:sans-serif; margin:0 0 20px 0; font-size:2rem; letter-spacing:1px;">🇺🇸 Correct! 🇺🇸</h1>
        <button id="closePopup" style="background:#b22234; color:#fff; border:none; padding:10px 20px; font-size:1rem; font-weight:bold; border-radius:4px; cursor:pointer; font-family:sans-serif;">Close</button>
      </dialog>`
    );
    document.getElementById('correct1').addEventListener('change', e => e.target.checked && document.getElementById('pop').showModal());
    document.getElementById('closePopup').addEventListener('click', () => { document.getElementById('pop').close(); document.getElementById('correct1').checked = false; });
  });
</script>


</div>
