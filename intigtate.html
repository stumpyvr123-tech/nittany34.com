<h1> Welcome to the help for Nittany34.com</h1>



<style>
  body {
    font-family: Arial, sans-serif;
  }

  .collapsible {
    background-color: #333;
    color: white;
    cursor: pointer;
    padding: 14px;
    width: 200px;
    border: none;
    text-align: left;
    outline: none;
    font-size: 16px;
  }

  .collapsible:hover {
    background-color: #555;
  }

  .content {
    padding: 10px;
    display: none;
    background-color: #f1f1f1;
    width: 180px;
  }
</style>
</head>

<body>

<button class="collapsible">Navigation guide</button>

<div class="content">
  <p1> BUTTONS: Click on a button to navigate to it.
    COLLAPSABLE MENUS: Click on the button to expand the menu, then click on the link to navigate to it.
    CLOUDFLARE SECURITY CAPTCHA: If you see a Cloudflare CAPTCHA, complete it to proceed to the page.

  </p1>
</div>

<script>
  const button = document.querySelector(".collapsible");
  const content = document.querySelector(".content");

  button.addEventListener("click", function() {
    if (content.style.display === "block") {
      content.style.display = "none";
    } else {
      content.style.display = "block";
    }
  });







</script>






</body>
</html>
