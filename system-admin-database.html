<!DOCTYPE html>
<html>
<head>
    <title>System Admin Database</title>
    <link rel="icon" href="Untitled Project.jpg">
    <style>
        body {
            background-color: rgb(0, 183, 255);
            color: rgb(225, 0, 255);
            font-family: 'Courier New', monospace;
        }
        input {
            font-family: 'Courier New', monospace;
            padding: 5px;

        #popup {

            padding: 20px;
            border: 1px solid black;
            font-family: Arial, sans-serif;

    <script>
        function checkCode(event) {

            const code = document.getElementById('code').value;
            if (code === '0323systemloginapplication') {
                window.location.href = 'fdkasmgokdfmgrtidef0ir90ti049530fggsecretid=20.html';

</body>
</html>
