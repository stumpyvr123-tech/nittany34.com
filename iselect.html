.overlay{

.card{

/* CLOSE BUTTON */

.close-btn{
    position:absolute;

    top:14px;
    right:14px;

    width:38px;
    height:38px;

    border:none;
    border-radius:12px;

    background:rgba(255,255,255,.06);

    color:white;

    cursor:pointer;

    transition:.2s;
}

.close-btn:hover{
    transform:scale(1.08);
    background:rgba(255,255,255,.12);
}

@keyframes popup{

    from{
        opacity:0;
        transform:translateY(20px) scale(.96);
    }

    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

@keyframes fade{

    from{
        opacity:0;
    }

    to{

    }
}
