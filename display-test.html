<!DOCTYPE html>
<html>
<head>
    <title>Display Test</title>
    <link rel="icon" href="Untitled Project.jpg">
    <style>
        body {
            background-color: rgb(0, 183, 255);
            font-family: 'Courier New', monospace;
            color: rgb(225, 0, 255);
        }
        a {
            color: rgb(212, 0, 255);
        }
        a:visited {
            color: rgb(174, 0, 255);
        }
        a:hover {
            color: rgb(255, 0, 0);
        }
        a:active {
            color: rgb(255, 0, 200);
        }
        .button-link {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(to right, black, #333);
            color: rgb(0, 255, 13);
            text-decoration: none;
            border: 2px solid black;
            font-family: 'Courier New', monospace;
            border-radius: 10px;
            margin: 5px;
        }
        .button-link:hover {
            background-color: rgb(47, 0, 255);
            color: rgb(255, 0, 0);
        }
        h1, h2 {
            text-align: center;
        }
        footer {
            margin-top: 50px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 20px;">
        <span onclick="toggleLanguageMenu()" class="button-link" style="cursor:pointer;">🌐</span>
        <div id="language-menu" style="display:none; position:absolute; background-color: rgba(0,183,255,0.9); border: 2px solid black; padding:10px; border-radius:10px; text-align:center;">
            <button onclick="switchToEnglish()" class="button-link">English</button><br>
            <button onclick="switchToSpanish()" class="button-link">Español</button>
        </div>
    </div>

    <h1>DISPLAY TEST PAGE</h1>

    <p>This is a simple display test page.</p>

    <p>If you can read this text clearly, your HTML rendering is working.</p>

    <hr>

    <p>System Check:</p>
    <ul>
        <li>Text Rendering: OK</li>
        <li>Background Load: OK</li>
        <li>HTML Structure: OK</li>
    </ul>

    <hr>

    <p>Go back with the button below</p>

    <div style="text-align: center;">
        <a href="index.html" class="button-link">Back to Home</a>
    </div>

    <footer>developed by nittany34</footer>

    <script>
        function toggleLanguageMenu() {
            var menu = document.getElementById('language-menu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }
        function switchToEnglish() {
            toggleLanguageMenu();
        }
        function switchToSpanish() {
            window.location.href = 'display-test-es.html';
        }
    </script>

</body>
</html>
