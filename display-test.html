<!DOCTYPE html>
<html>
<head>
    <title>Display Test</title>
    <link rel="icon" href="Untitled Project.jpg">
    <style>
        body {
            background-color: rgb(0, 183, 255);
            font-family: 'Courier New', monospace;
            color: rgb(225, 0, 255);
        }
        a {
            color: rgb(212, 0, 255);
        }
        a:visited {
            color: rgb(174, 0, 255);
        }
        a:hover {
            color: rgb(255, 0, 0);
        }
        a:active {
            color: rgb(255, 0, 200);
        }
        .button-link {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(to right, black, #333);
            color: rgb(0, 255, 13);
            text-decoration: none;
            border: 2px solid black;
            font-family: 'Courier New', monospace;
            border-radius: 10px;
            margin: 5px;
        }
        .button-link:hover {
            background-color: rgb(47, 0, 255);
            color: rgb(255, 0, 0);
        }
        h1, h2 {
            text-align: center;
        }
        footer {
            margin-top: 50px;
            text-align: center;
        }
    
        .language-toggler {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .language-arrow {
            font-size: 0.9em;
        }
        .language-menu {
            display: none;
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 183, 255, 0.95);
            border: 2px solid black;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            min-width: 170px;
        }
        .language-menu .button-link {
            display: block;
            width: calc(100% - 12px);
            margin: 6px auto;
        }
        .language-notice {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 10px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 2000;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
        }
    
        .help-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            font-size: 1.1rem;
            border-radius: 50%;
            margin-left: 8px;
        }
        .help-menu {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            left: auto;
            background-color: rgba(255, 255, 255, 0.98);
            color: rgb(0, 0, 0);
            border: 2px solid black;
            padding: 12px;
            border-radius: 14px;
            text-align: left;
            z-index: 1500;
            width: 320px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.25);
        }
        .help-tabs {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin-bottom: 10px;
        }
        .help-tab {
            flex: 1;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid black;
            background: rgba(0, 0, 0, 0.08);
            cursor: pointer;
            font-family: 'Courier New', monospace;
            color: rgb(0, 0, 0);
        }
        .help-tab.active {
            background: black;
            color: rgb(0, 255, 13);
            border-color: rgb(0, 255, 13);
        }
        .help-content {
            padding: 10px;
            background: rgba(0, 183, 255, 0.1);
            border-radius: 10px;
            min-height: 120px;
            font-size: 0.96rem;
        }
    </style>
</head>
<body>    <div style="position: relative; text-align: center; margin-bottom: 20px;">
        <button onclick="toggleLanguageMenu()" class="button-link language-toggler" type="button">
            <span class="globe">🌐</span>
            <span class="language-label">English</span>
            <span class="language-arrow">▼</span>
        </button>
        <button onclick="toggleHelpMenu()" class="button-link help-button" type="button">?</button>
        <div id="language-menu" class="language-menu">
            <button onclick="switchToEnglish()" class="button-link" type="button">English</button>
            <button onclick="switchToSpanish()" class="button-link" type="button">Español</button>
        </div>
        <div id="help-menu" class="help-menu">
            <div class="help-tabs">
                <button class="help-tab active" type="button" data-tab="what" onclick="openHelpTab('what')">What is this?</button><button class="help-tab" type="button" data-tab="how" onclick="openHelpTab('how')">How to use</button><button class="help-tab" type="button" data-tab="navigation" onclick="openHelpTab('navigation')">Navigation</button>
            </div>
            <div id="help-content" class="help-content"></div>
        </div>
        <div id="language-notice" class="language-notice"></div>
    </div>

    <h1>DISPLAY TEST PAGE</h1>

    <p>This is a simple display test page.</p>

    <p>If you can read this text clearly, your HTML rendering is working.</p>

    <hr>

    <p>System Check:</p>
    <ul>
        <li>Text Rendering: OK</li>
        <li>Background Load: OK</li>
        <li>HTML Structure: OK</li>
    </ul>

    <hr>

    <p>Go back with the button below</p>

    <div style="text-align: center;">
        <a href="index.html" class="button-link">Back to Home</a>
    </div>

    <footer>developed by nittany34</footer>

        <script>
        const helpData = {'what': {title: 'What is this?', text: 'This page checks whether text and styling display correctly in your browser.'}, 'how': {title: 'How to use', text: 'If text is readable and colors look right, the page is rendering well.'}, 'navigation': {title: 'Navigation', text: 'Use the Home button to return after testing.'}};
        function toggleLanguageMenu() {
            const menu = document.getElementById('language-menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            const help = document.getElementById('help-menu');
            if (help) help.style.display = 'none';
        }
        function toggleHelpMenu() {
            const menu = document.getElementById('help-menu');
            if (menu.style.display === 'block') {
                menu.style.display = 'none';
            } else {
                menu.style.display = 'block';
                openHelpTab(Object.keys(helpData)[0]);
            }
            const lang = document.getElementById('language-menu');
            if (lang) lang.style.display = 'none';
        }
        function openHelpTab(tab) {
            const data = helpData[tab];
            if (!data) return;
            const content = document.getElementById('help-content');
            content.innerHTML = '<strong>' + data.title + '</strong><p style="margin-top:8px;">' + data.text + '</p>';
            document.querySelectorAll('.help-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
        }
        function switchToEnglish() {
            showLanguageNotice('Switching to English...');
            setTimeout(() => window.location.href = 'display-test.html', 600);
        }
        function switchToSpanish() {
            showLanguageNotice('Cambiando a Español...');
            setTimeout(() => window.location.href = 'display-test-es.html', 600);
        }
        function showLanguageNotice(message) {
            const notice = document.getElementById('language-notice');
            if (!notice) return;
            notice.textContent = message;
            notice.style.display = 'block';
            notice.style.opacity = '1';
            setTimeout(() => { notice.style.opacity = '0'; setTimeout(() => notice.style.display = 'none', 300); }, 1800);
        }
        document.addEventListener('click', (event) => {
            const langMenu = document.getElementById('language-menu');
            const helpMenu = document.getElementById('help-menu');
            const langButton = document.querySelector('.language-toggler');
            const helpButton = document.querySelector('.help-button');
            if (langMenu && langButton && !langMenu.contains(event.target) && !langButton.contains(event.target)) {
                langMenu.style.display = 'none';
            }
            if (helpMenu && helpButton && !helpMenu.contains(event.target) && !helpButton.contains(event.target)) {
                helpMenu.style.display = 'none';
            }
        });
    </script>
