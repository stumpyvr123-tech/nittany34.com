<!DOCTYPE html>
<html>
<head>
    <title>Display Test</title>
    <link rel="icon" href="Untitled Project.jpg">
    <style>
        body {
            background-color: rgb(0, 183, 255);
            font-family: 'Courier New', monospace;
            color: rgb(225, 0, 255);
        }
        a {
            color: rgb(212, 0, 255);
        }
        a:visited {
            color: rgb(174, 0, 255);
        }
        a:hover {
            color: rgb(255, 0, 0);
        }
        a:active {
            color: rgb(255, 0, 200);
        }
        .button-link {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(to right, black, #333);
            color: rgb(0, 255, 13);
            text-decoration: none;
            border: 2px solid black;
            font-family: 'Courier New', monospace;
            border-radius: 10px;
            margin: 5px;
        }
        .button-link:hover {
            background-color: rgb(47, 0, 255);
            color: rgb(255, 0, 0);
        }
        h1, h2 {
            text-align: center;
        }
        footer {
            margin-top: 50px;
            text-align: center;
        }
    
        .language-toggler {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .language-arrow {
            font-size: 0.9em;
        }
        .language-menu {
            display: none;
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 183, 255, 0.95);
            border: 2px solid black;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            min-width: 170px;
        }
        .language-menu .button-link {
            display: block;
            width: calc(100% - 12px);
            margin: 6px auto;
        }
        .language-notice {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 10px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 2000;
            font-family: 'Courier New', monospace;
            font-size: 0.95rem;
        }        .help-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            font-size: 1.1rem;
            border-radius: 50%;
            margin-left: 8px;
        }
        .help-menu {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.98);
            color: rgb(0, 0, 0);
            border: 2px solid black;
            padding: 18px;
            border-radius: 18px;
            text-align: left;
            z-index: 1500;
            width: min(420px, 92vw);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }
        .help-tabs {
            display: flex;
            justify-content: space-between;
            gap: 6px;
            margin-bottom: 12px;
        }
        .help-tab {
            flex: 1;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid black;
            background: rgba(0, 0, 0, 0.08);
            cursor: pointer;
            font-family: 'Courier New', monospace;
            color: rgb(0, 0, 0);
            transition: background 0.2s, color 0.2s;
        }
        .help-tab.active {
            background: black;
            color: rgb(0, 255, 13);
            border-color: rgb(0, 255, 13);
        }
        .help-submenu {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .help-subtab {
            flex: 1 1 45%;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.2);
            background: rgba(0, 0, 0, 0.04);
            cursor: pointer;
            font-family: 'Courier New', monospace;
            color: rgb(0, 0, 0);
            text-align: center;
        }
        .help-subtab.active {
            background: rgba(0, 255, 13, 0.15);
            border-color: rgb(0, 255, 13);
        }
        .help-content {
            padding: 12px;
            background: rgba(0, 183, 255, 0.12);
            border-radius: 10px;
            min-height: 140px;
            font-size: 0.95rem;
            line-height: 1.5;
        }
</style>
</head>
<body>        

        <div style="position: relative; text-align: center; margin-bottom: 20px;">
        <button onclick="toggleLanguageMenu()" class="button-link language-toggler" type="button">
            <span class="globe">🌐</span>
            <span class="language-label">English</span>
            <span class="language-arrow">▼</span>
        </button>
        <button onclick="toggleHelpMenu()" class="button-link help-button" type="button">?</button>
        <div id="language-menu" class="language-menu">
            <button onclick="switchToEnglish()" class="button-link" type="button">English</button>
            <button onclick="switchToSpanish()" class="button-link" type="button">Español</button>
        </div>
        <div id="help-menu" class="help-menu">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:10px;">
                <div style="font-weight:bold; font-size:1rem;">Help Menu</div>
                <button onclick="toggleHelpMenu()" style="background:none; border:none; font-size:1.2rem; cursor:pointer;">×</button>
            </div>
            <div class="help-tabs">
                <button class="help-tab" type="button" data-tab="what" onclick="openHelpTab('what')">What is this?</button>
                <button class="help-tab" type="button" data-tab="how" onclick="openHelpTab('how')">How to use</button>
                <button class="help-tab" type="button" data-tab="navigation" onclick="openHelpTab('navigation')">Navigation</button>
                <button class="help-tab" type="button" data-tab="faq" onclick="openHelpTab('faq')">FAQ</button>
            </div>
            <div id="help-submenu" class="help-submenu"></div>
            <div id="help-content" class="help-content"></div>
        </div>
        <div id="language-notice" class="language-notice"></div>
    </div>

<h1>DISPLAY TEST PAGE</h1>

    <p>This is a simple display test page.</p>

    <p>If you can read this text clearly, your HTML rendering is working.</p>

    <hr>

    <p>System Check:</p>
    <ul>
        <li>Text Rendering: OK</li>
        <li>Background Load: OK</li>
        <li>HTML Structure: OK</li>
    </ul>

    <hr>

    <p>Go back with the button below</p>

    <div style="text-align: center;">
        <a href="index.html" class="button-link">Back to Home</a>
    </div>

    <footer>developed by nittany34</footer>

        <script>
        const helpData = {
            'what': { title: 'What is this?', sub: {
                'Purpose': 'Checks display and structure.',
                'Working': 'Text and colors should be readable.',
                'Testing': 'Useful for browser rendering checks.'
            } },
            'how': { title: 'How to use', sub: {
                'Readability': 'Check that text is clear.',
                'Layout': 'Confirm the page structure.',
                'Browser': 'Use a modern browser for best results.'
            } },
            'navigation': { title: 'Navigation', sub: {
                'Back Home': 'Click the home button below.',
                'Try Page': 'Move to other pages afterward.',
                'Help': 'Open help for more details.'
            } },
            'faq': { title: 'FAQ', sub: {
                'Pass/Fail': 'Looks good means pass.',
                'Issues': 'Update browser or enable JS if needed.',
                'Return': 'Go back to the homepage anytime.'
            } }
        };
        function toggleLanguageMenu() {
            const menu = document.getElementById('language-menu');
            if (!menu) return;
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
            const help = document.getElementById('help-menu');
            if (help) help.style.display = 'none';
        }
        function toggleHelpMenu() {
            const menu = document.getElementById('help-menu');
            if (!menu) return;
            if (menu.style.display === 'block') {
                menu.style.display = 'none';
            } else {
                const firstTab = Object.keys(helpData)[0];
                openHelpTab(firstTab);
                menu.style.display = 'block';
            }
            const lang = document.getElementById('language-menu');
            if (lang) lang.style.display = 'none';
        }
        function openHelpTab(tab) {
            const data = helpData[tab];
            if (!data) return;
            const submenu = document.getElementById('help-submenu');
            submenu.innerHTML = '';
            const firstSub = Object.keys(data.sub || {})[0] || null;
            if (data.sub) {
                Object.keys(data.sub).forEach((subtab) => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'help-subtab';
                    btn.textContent = subtab;
                    btn.onclick = () => openHelpSubtab(tab, subtab);
                    btn.dataset.subtab = subtab;
                    submenu.appendChild(btn);
                });
            }
            openHelpSubtab(tab, firstSub);
            document.querySelectorAll('.help-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
        }
        function openHelpSubtab(tab, subtab) {
            const data = helpData[tab];
            if (!data) return;
            const content = document.getElementById('help-content');
            const subContent = data.sub && data.sub[subtab];
            const title = data.title || '';
            if (subContent) {
                content.innerHTML = '<strong>' + title + ' — ' + subtab + '</strong><p style="margin-top:10px;">' + subContent + '</p>';
            } else {
                content.innerHTML = '<strong>' + title + '</strong><p style="margin-top:10px;">' + (data.text || 'No details available.') + '</p>';
            }
            document.querySelectorAll('.help-subtab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.subtab === subtab);
            });
        }
        function buildHelpTabs() {
            const tabs = document.querySelectorAll('.help-tab');
            if (!tabs.length) return;
            tabs.forEach(btn => {
                btn.addEventListener('click', () => openHelpTab(btn.dataset.tab));
            });
        }
        function switchToEnglish() {
            const pathname = window.location.pathname;
            showLanguageNotice('Switching to English...');
            setTimeout(() => {
                if (pathname.endsWith('-es.html')) {
                    window.location.href = pathname.replace(/-es\.html$/, '.html');
                } else {
                    window.location.href = 'index.html';
                }
            }, 600);
        }
        function switchToSpanish() {
            const pathname = window.location.pathname;
            showLanguageNotice('Cambiando a Español...');
            setTimeout(() => {
                if (pathname.endsWith('.html') && !pathname.endsWith('-es.html')) {
                    window.location.href = pathname.replace(/\.html$/, '-es.html');
                } else {
                    window.location.href = 'index-es.html';
                }
            }, 600);
        }
        function showLanguageNotice(message) {
            const notice = document.getElementById('language-notice');
            if (!notice) return;
            notice.textContent = message;
            notice.style.display = 'block';
            notice.style.opacity = '1';
            setTimeout(() => { notice.style.opacity = '0'; setTimeout(() => notice.style.display = 'none', 300); }, 1800);
        }
        document.addEventListener('click', (event) => {
            const langMenu = document.getElementById('language-menu');
            const helpMenu = document.getElementById('help-menu');
            const langButton = document.querySelector('.language-toggler');
            const helpButton = document.querySelector('.help-button');
            if (langMenu && langButton && !langMenu.contains(event.target) && !langButton.contains(event.target)) {
                langMenu.style.display = 'none';
            }
            if (helpMenu && helpButton && !helpMenu.contains(event.target) && !helpButton.contains(event.target)) {
                helpMenu.style.display = 'none';
            }
        });
        document.addEventListener('keydown', (event) => {
            const helpMenu = document.getElementById('help-menu');
            if (event.key === 'Escape' && helpMenu) {
                helpMenu.style.display = 'none';
            }
        });
        document.addEventListener('DOMContentLoaded', buildHelpTabs);
    </script>
