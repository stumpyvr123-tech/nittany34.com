<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Deutsch Dub</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            color: #f3e7ff;
            background: url('n34webbg.png') center/cover no-repeat fixed;
            background-color: #0e1a3f;
        }
        .screen {
            max-width: 900px;
            margin: 40px auto;
            padding: 32px;
            background: rgba(12, 18, 46, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
        }
        h1, h2 {
            text-align: center;
            margin: 0 0 16px;
            color: #f4d6ff;
        }
        p {
            text-align: center;
            max-width: 720px;
            margin: 0 auto 28px;
            line-height: 1.7;
            color: #dcd2ff;
        }
        .top-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .button-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.08);
            color: #f7efff;
            text-decoration: none;
            transition: transform 180ms ease, background 180ms ease;
        }
        .button-link:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.16);
        }
    </style>
</head>
<body>
    <div class="screen">
        <div class="top-row">
            <a href="index.html" class="button-link">Home</a>
            <a href="google-login.html" class="button-link">Login</a>
        </div>
        <h1>Deutsch Dub</h1>
        <p>Willkommen auf der deutschen Seite. Diese Seite ist ein echtes HTML-Dokument, damit die Auswahl der Sprache funktioniert.</p>
        <p>Nutze oben den Login-Link, um zur Anmeldung zu gelangen, oder kehre zurück zur Startseite.</p>
    </div>
</body>
</html>
