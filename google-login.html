<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google Account Login</title>
    <link rel="icon" href="Untitled Project.jpg">
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f2145 0%, #142a5f 100%);
            color: #eef4ff;
        }
        main {
            width: min(520px, calc(100vw - 32px));
            padding: 40px 30px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 2.8rem);
        }
        p {
            margin: 16px auto 0;
            max-width: 520px;
            line-height: 1.8;
            color: #d3defc;
        }
        form {
            margin-top: 28px;
            display: grid;
            gap: 16px;
        }
        input {
            width: 100%;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.08);
            color: #eef4ff;
            font-size: 1rem;
        }
        input::placeholder {
            color: #b1c2eb;
        }
        button {
            border: none;
            border-radius: 999px;
            padding: 14px 22px;
            font-weight: 700;
            font-size: 1rem;
            background: #4285f4;
            color: white;
            cursor: pointer;
            transition: transform 160ms ease, box-shadow 160ms ease;
        }
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 36px rgba(66, 133, 244, 0.3);
        }
        .actions {
            margin-top: 28px;
            display: flex;
            justify-content: center;
        }
        .actions a {
            text-decoration: none;
            color: #a9c5ff;
            font-weight: 600;
        }
        #message {
            margin-top: 10px;
            color: #f5b0b0;
            min-height: 1.2em;
        }
    </style>
</head>
<body>
    <main>
        <h1>Google Account Login</h1>
        <p>Enter your Google email to continue. This page simulates a clean Google account sign-in flow for the site.</p>
        <form id="loginForm">
            <input id="email" type="email" placeholder="you@gmail.com" required>
            <button type="submit">Sign in with Google</button>
        </form>
        <div id="message" aria-live="polite"></div>
        <div class="actions"><a href="index.html">Back to Home</a></div>
    </main>
    <script>
        const form = document.getElementById('loginForm');
        const message = document.getElementById('message');
        form.addEventListener('submit', event => {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) {
                message.textContent = 'Please enter your Google email address.';
                return;
            }
            sessionStorage.setItem('googleUserEmail', email);
            window.location.href = 'google-dashboard.html';
        });
    </script>
</body>
</html>
