<!DOCTYPE html>
<html>
<head>
    <title>Google Account Login</title>
    <link rel="icon" href="Untitled Project.jpg">
    <style>
        body {
            background-color: rgb(0, 183, 255);
            font-family: 'Courier New', monospace;
            color: rgb(225, 0, 255);
            margin: 0;
            padding: 0;
        }
        a {
            color: rgb(212, 0, 255);
        }
        a:hover {
            color: rgb(255, 0, 0);
        }
        .container {
            max-width: 520px;
            margin: 36px auto;
            padding: 26px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid black;
            border-radius: 18px;
        }
        h1 {
            text-align: center;
        }
        p {
            text-align: center;
            margin: 0 0 22px;
            line-height: 1.6;
        }
        input {
            width: 100%;
            margin: 10px 0;
            padding: 12px 14px;
            border-radius: 10px;
            border: 2px solid black;
            background: rgba(255,255,255,0.12);
            color: rgb(225, 0, 255);
            font-family: 'Courier New', monospace;
        }
        button {
            width: 100%;
            padding: 12px 0;
            background: linear-gradient(to right, black, #333);
            color: rgb(0, 255, 13);
            border: 2px solid black;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
        }
        button:hover {
            background-color: rgb(47, 0, 255);
            color: rgb(255, 0, 0);
        }
        .actions {
            text-align: center;
            margin-top: 20px;
        }
        footer {
            text-align: center;
            margin-top: 26px;
        }
        #message {
            text-align: center;
            margin-top: 10px;
            color: rgb(255, 0, 0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Google Account Login</h1>
        <p>Type your Google email below and sign in. This keeps the original site styling and removes extra clutter.</p>
        <form id="loginForm">
            <input id="email" type="email" placeholder="you@gmail.com" required>
            <button type="submit">Sign in with Google</button>
        </form>
        <div id="message"></div>
        <div class="actions"><a href="index.html" class="button-link">Back to Home</a></div>
    </div>
    <footer>developed by nittany34</footer>
    <script>
        const form = document.getElementById('loginForm');
        const message = document.getElementById('message');
        form.addEventListener('submit', event => {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) {
                message.textContent = 'Please enter a Google email address.';
                return;
            }
            sessionStorage.setItem('googleUserEmail', email);
            window.location.href = 'google-dashboard.html';
        });
    </script>
</body>
</html>
