<div class="container">
        <h1>Google Account Login</h1>
        <p>Type your Google email below and sign in. This keeps the original site styling and removes extra clutter.</p>
        <form id="loginForm">
            <input id="email" type="email" placeholder="you@gmail.com" required>
            <button type="submit">Sign in with Google</button>
        </form>
        <div id="message"></div>
        <div class="actions"><a href="index.html" class="button-link">Back to Home</a></div>
    </div>
    <footer>developed by nittany34</footer>
    <script>
        const form = document.getElementById('loginForm');
        const message = document.getElementById('message');
        form.addEventListener('submit', event => {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) {
                message.textContent = 'Please enter a Google email address.';
                return;
            }
            sessionStorage.setItem('googleUserEmail', email);
            window.location.href = 'google-dashboard.html';
        });
    </script>
