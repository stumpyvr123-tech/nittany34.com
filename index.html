<body>

    <h1>Welcome</h1>

        <p>Banned Users:</p>
        <ul id="bannedListHome"></ul>
    </div>

    <footer>developed by nittany34</footer>

    <script>
        function login() {
            const user = document.getElementById('username').value.trim();
            if (user) {
                sessionStorage.setItem('currentUser', user);
                let active = JSON.parse(localStorage.getItem('activeUsers') || '[]');
                if (!active.includes(user)) {
                    active.push(user);
                    localStorage.setItem('activeUsers', JSON.stringify(active));
                }
                alert('Logged in as ' + user);
            }
        }
        function updateBannedListHome() {
            const banned = JSON.parse(localStorage.getItem('bannedUsers') || '[]');
            const list = document.getElementById('bannedListHome');
            list.innerHTML = '';
            banned.forEach(user => {
                const li = document.createElement('li');
                li.textContent = user;
                list.appendChild(li);
            });
        }
        if (sessionStorage.getItem('secretAccessed') === 'true') {
            document.getElementById('secret-buttons').style.display = 'block';
            updateBannedListHome();
        }
    </script>
