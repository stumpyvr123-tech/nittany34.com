<!DOCTYPE html>
<html>
<head>
    <title>Welcome to nittany34.com!</title>
    <link rel="icon" href="Untitled Project.jpg">
        <style>
        body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #f3e7ff;
            background: url('n34webbg.png') center/cover no-repeat fixed;
            background-color: #0e1a3f;
            background-blend-mode: normal;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
        }

        html {
            scroll-behavior: smooth;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        .screen {
            width: min(92vw, 760px);
            padding: 32px;
            background: rgba(10, 14, 30, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            text-align: center;
        }
        h1, h2 {
            margin: 0 0 16px;
            color: #f4d6ff;
        }
        p {
            max-width: 700px;
            margin: 0 auto 28px;
            line-height: 1.7;
            color: #dcd2ff;
        }
        .button-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin: 0 auto 16px;
        }
        .button-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 150px;
            padding: 12px 20px;
            border-radius: 12px;
            border: 2px solid rgba(0, 0, 0, 0.75);
            background: linear-gradient(180deg, #080808 0%, #242424 100%);
            color: rgb(0, 255, 13);
            text-decoration: none;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
            transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease, color 180ms ease;
            font-size: 0.98rem;
            letter-spacing: 0.03em;
        }
        .button-link:hover {
            transform: translateY(-1px);
            background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
            box-shadow: 0 16px 34px rgba(0, 0, 0, 0.45);
            color: #b7ff9e;
        }
        footer {
            text-align: center;
            color: #c8b2ff;
            margin-top: 14px;
        }
        @media (max-width: 640px) {
            .screen {
                padding: 22px;
            }
            .button-row {
                gap: 10px;
            }
        }
</style>
</head>
<body>
    <div class="screen">
        <h1>Welcome</h1>
        <p>Choose a page below to continue.</p>
        <div class="button-row">
            <a href="about.html" class="button-link">About</a>
            <a href="system-requirements.html" class="button-link">System Requirements</a>
            <a href="documenting.html" class="button-link">Coding Journey</a>
            <a href="https://www.youtube.com/@Nittany34YT" target="_blank" class="button-link">My channel</a>
            <a href="google-login.html" class="button-link">Login</a>
        </div>
    </div>
    <footer>developed by nittany34</footer>

</body>
</html>
