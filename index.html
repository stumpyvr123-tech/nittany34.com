<!DOCTYPE html>
<html>
<head>
    <title>Welcome to nittany34.com!</title>
    <link rel="icon" href="Untitled Project.jpg">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', monospace;
            color: #e1b8ff;
            background: url('n34webbg.png') center/cover no-repeat fixed, rgb(0, 183, 255);
            background-blend-mode: overlay;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            pointer-events: none;
            z-index: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        .page {
            position: relative;
            z-index: 1;
            padding: 40px 20px 60px;
            max-width: 1120px;
            margin: 0 auto;
        }
        h1, h2 {
            text-align: center;
            margin: 0 0 18px;
        }
        p {
            text-align: center;
            max-width: 760px;
            margin: 0 auto 28px;
            line-height: 1.7;
            color: #f3d8ff;
        }
        .button-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 10px;
            padding: 14px 24px;
            min-width: 160px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: linear-gradient(135deg, rgba(18, 19, 49, 0.92), rgba(34, 38, 79, 0.95));
            color: #f7efff;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
            transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease, color 180ms ease;
            font-family: 'Courier New', monospace;
            font-size: 0.98rem;
            letter-spacing: 0.02em;
        }
        .button-link:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, rgba(60, 72, 154, 0.96), rgba(23, 18, 52, 0.96));
            box-shadow: 0 22px 48px rgba(0, 0, 0, 0.32);
            color: #fff;
        }
        .google-icon-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            margin: 10px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.22);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.24);
            transition: transform 180ms ease, background 180ms ease, box-shadow 180ms ease;
        }
        .google-icon-button:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.22);
            box-shadow: 0 22px 46px rgba(0, 0, 0, 0.32);
        }
        .google-icon-button svg {
            width: 28px;
            height: 28px;
        }
        .links,
        .dub-grid,
        .icon-row {
            text-align: center;
        }
        .dub-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 24px;
        }
        .dub-grid .button-link {
            flex: 1 1 210px;
            max-width: 220px;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }
        footer {
            position: relative;
            z-index: 1;
            margin-top: 50px;
            text-align: center;
            color: #d6b0ff;
        }
        @media (max-width: 680px) {
            .button-link {
                min-width: auto;
                width: calc(50% - 28px);
            }
            .button-link:nth-child(odd) {
                margin-left: 0;
            }
            .dub-grid {
                flex-direction: column;
            }
            .dub-grid .button-link {
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>Welcome to nittany34.com!</h1>
    <p>Core links only. The site keeps the original look, no extra testing pages or clutter.</p>
    <div class="links">
        <a href="index.html" class="button-link">Home</a>
        <a href="about.html" class="button-link">About</a>
        <a href="system-requirements.html" class="button-link">System Requirements</a>
        <a href="documenting.html" class="button-link">Coding Journey</a>
        <a href="https://www.youtube.com/@Nittany34YT" target="_blank" class="button-link">My channel</a>
    </div>
    <div class="icon-row">
        <a href="google-login.html" class="google-icon-button" aria-label="Sign in with Google">
            <span class="sr-only">Sign in with Google</span>
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path fill="#4285F4" d="M24 9.5c3.6 0 6.4 1.4 8.4 2.6l6.1-6.1C34.8 3.5 29.9 1.5 24 1.5 14.7 1.5 6.8 6.9 3.4 14.8l7.6 5.9C12.8 16.1 17.8 9.5 24 9.5z"/>
                <path fill="#34A853" d="M46.5 24.2c0-1.5-.1-2.6-.4-3.8H24v7.2h12.8c-.6 3.4-2.8 6.1-5.8 8l9.1 7.1c5.3-4.9 8.4-12.2 8.4-18.5z"/>
                <path fill="#FBBC05" d="M11 28.9c-.8-2.3-1.3-4.8-1.3-7.4s.5-5.1 1.3-7.4L3.4 8.2C1.2 12.5 0 17.1 0 24s1.2 11.5 3.4 15.8l7.6-5.9z"/>
                <path fill="#EA4335" d="M24 46.5c6.1 0 11.3-2 15-5.4l-7.1-5.6c-2.1 1.4-4.8 2.3-7.9 2.3-6.2 0-11.4-4.1-13.3-9.6l-7.6 5.9C6.8 41.1 14.7 46.5 24 46.5z"/>
                <path fill="none" d="M0 0h48v48H0z"/>
            </svg>
        </a>
    </div>
    <div class="dub-grid">
        <a href="google-login.html" class="button-link">Philippines</a>
        <a href="google-login.html" class="button-link">Canada</a>
        <a href="google-login.html" class="button-link">Español</a>
        <a href="google-login.html" class="button-link">Deutsch</a>
        <a href="google-login.html" class="button-link">中文</a>
        <a href="google-login.html" class="button-link">日本語</a>
        <a href="google-login.html" class="button-link">Pig Latin</a>
        <a href="google-login.html" class="button-link">Dutch</a>
    </div>
    <footer>developed by nittany34</footer>
</body>
</html>
